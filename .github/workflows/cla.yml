name: CLA

# Requires every contributor to sign the Individual CLA (CLA.md) before their PR
# can merge. Signatures are recorded, by the bot, in signatures/version1/cla.json
# on the `cla-signatures` branch of THIS repo — no third-party service, no external
# database. A contributor signs by posting the exact comment shown in the bot's
# reply; re-check with a `recheck` comment.
#
# ONE-TIME SETUP (Maintainer, in the browser):
#   Create a fine-grained or classic PAT with `repo` scope on MattsomStudio/memsom
#   and add it as a repo secret named PERSONAL_ACCESS_TOKEN. The default GITHUB_TOKEN
#   cannot reliably commit the signature file back, hence the PAT.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Least privilege: only what the CLA bot needs to comment, set status, and store sigs.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/MattsomStudio/memsom/blob/main/CLA.md'
          branch: 'cla-signatures'
          # The maintainer and bots never need to sign.
          allowlist: MattsomStudio,dependabot[bot],*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you.'

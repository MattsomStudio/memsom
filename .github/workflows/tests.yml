name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # nightly full matrix (incl. Windows) at 07:00 UTC (~03:00 ET)
    - cron: "0 7 * * *"

jobs:
  # Windows on hosted runners is I/O-bound-slow (~10 min vs ~30s elsewhere) because
  # the suite churns hundreds of on-disk temp SQLite DBs. Skip it on plain pushes for
  # fast feedback; run the FULL matrix on PRs, the nightly schedule, and manual runs.
  config:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.set.outputs.os }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo 'os=["ubuntu-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest","macos-latest","windows-latest"]' >> "$GITHUB_OUTPUT"
          fi

  unittest:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.config.outputs.os) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # memsom is stdlib-only: no pip install of any dependency.
      # TestEndToEndDemo (frozen core) skips itself when the seeded vault
      # note isn't present — expected on CI runners.
      - name: Run test suite
        run: python -W error::DeprecationWarning -m unittest discover -s . -p "test_*.py" -v

      # The frozen core regression gate must pass on its own as well.
      - name: Frozen core regression gate
        run: python -W error::DeprecationWarning -m unittest discover -s . -p "test_memsom.py" -v

      # Gate #3 broker entry point boots and enforces allow -> taint -> deny.
      - name: Gate 3 broker selfcheck
        run: python memsom_broker.py --selfcheck

    "memsom_trust.py",
    "memsom_verify_stale.py",
    "memsom_wire_claude.py",
]

# Data file: memsom.py resolves external_fallback.txt next to itself
# (HOME / "external_fallback.txt"), so it must land in site-packages root
# beside memsom.py for `memsom seed --offline` to work after a wheel install.
[tool.hatch.build.targets.wheel.force-include]
"external_fallback.txt" = "external_fallback.txt"
# Bundled Claude Code memory loop (skills + CLAUDE.md template) so a standalone
# `pip install` + `memsom wire-claude` finds them without a repo clone. The CLI
# resolves them relative to the installed package (site-packages/claude/...).
"claude" = "claude"

# ---------------------------------------------------------------------------
# sdist: same allowlist + the data file (README/LICENSE/pyproject.toml are

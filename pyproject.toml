    "memsom_confid.py",
    "memsom_contradict.py",
    "memsom_corroborate.py",
    "memsom_dashboard.py",
    "memsom_digest.py",
    "memsom_distill.py",
    "memsom_doctor.py",
    "memsom_embed.py",
    "memsom_federation.py",
    "memsom_forget.py",
    "memsom_gate.py",
    "memsom_heal.py",
    "memsom_hook.py",
    "memsom_ingest.py",
    "memsom_llm.py",
    "memsom_mcp.py",
    "memsom_obsidian.py",
    "memsom_policy.py",
    "memsom_profile.py",

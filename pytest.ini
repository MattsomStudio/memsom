[pytest]
pythonpath = .
; _weights is the Phase-3 distillation work dir — contains a vendored
; llama.cpp source tree whose tests must not be collected with memsom's.
; _build is a gitignored local dir whose audit_poc breaks collection.
; bench and demo hold no test files today; listed prophylactically so
; anything dropped in later doesn't get swept into the suite by accident.
norecursedirs = _weights __pycache__ .git _build _review _pkgtest_venv bench demo
